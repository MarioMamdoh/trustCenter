@if (blog) {
  <div class="container p-5 mx-auto blog-details">
    <h1 class="text-3xl font-bold text-center text-[#231942]">
      {{ blog["title"] }}
    </h1>
    <img
      [src]="blog['image']"
      [alt]="blog['title']"
      class="m-auto my-5 w-2/3 h-[500px] rounded-lg"
      />
      <div class="flex justify-between p-2 views-date">
        <span class="text-red-700">Views-{{ blog["views"] }}</span>
        <span class="text-yellow-500">{{
          blog["createdAt"] | date : "mediumDate"
        }}</span>
      </div>
      <div
        class="mt-3 font-light text-[#231942]"
        [innerHTML]="sanitizedContent"
      ></div>
      <a
        routerLink="/blogs"
        class="block mt-5 text-center bg-transparent py-1 text-black rounded-lg border-[#0070cd] border-2 border-solid cursor-pointer hover:bg-[#0070cd] hover:text-white transition-all w-1/2 m-auto"
        >
        Back to Blogs
      </a>
    </div>
  }
