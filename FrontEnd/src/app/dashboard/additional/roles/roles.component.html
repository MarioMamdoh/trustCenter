<section>
  <div
    class="filter-section"
    style="
      display: flex;
      gap: 16px;
      margin-bottom: 16px;
      align-items: center;
      flex-wrap: wrap;
    "
  >
    <mat-form-field>
      <mat-label>Select Filter Category</mat-label>
      <mat-select
        [(value)]="selectedCategory"
        (selectionChange)="onCategoryChange()"
      >
        <mat-option value="">None</mat-option>
        <mat-option value="area">Area</mat-option>
        <mat-option value="role">Role</mat-option>
        <mat-option value="area&role">Area & Role</mat-option>
        <mat-option value="name">Name</mat-option>
      </mat-select>
    </mat-form-field>

    <!-- Area Filter -->
    <mat-form-field
      *ngIf="selectedCategory === 'area' || selectedCategory === 'area&role'"
    >
      <mat-label>Select Area</mat-label>
      <mat-select [(value)]="selectedArea" (selectionChange)="applyFilters()">
        <mat-option value="">All</mat-option>
        <mat-option *ngFor="let area of areas" [value]="area">{{
          area
        }}</mat-option>
      </mat-select>
    </mat-form-field>

    <!-- Role Filter -->
    <mat-form-field
      *ngIf="selectedCategory === 'role' || selectedCategory === 'area&role'"
    >
      <mat-label>Select Role</mat-label>
      <mat-select [(value)]="selectedRole" (selectionChange)="applyFilters()">
        <mat-option value="">All</mat-option>
        <mat-option *ngFor="let role of roles" [value]="role">{{
          role
        }}</mat-option>
      </mat-select>
    </mat-form-field>

    <!-- Name Filter -->
    <mat-form-field *ngIf="selectedCategory === 'name'">
      <mat-label>Search by name</mat-label>
      <input
        matInput
        [value]="searchText"
        (input)="onNameInput($event)"
        placeholder="Type to search..."
      />
    </mat-form-field>
  </div>
  <div class="shadow-2xl services-table">
    <table mat-table [dataSource]="dataSource" class="mat-elevation-z8">
      <ng-container matColumnDef="position">
        <th mat-header-cell *matHeaderCellDef>No.</th>
        <td mat-cell *matCellDef="let element">{{ element.position }}</td>
      </ng-container>

      <ng-container matColumnDef="fullName" class="fullName">
        <th mat-header-cell *matHeaderCellDef>Full Name</th>
        <td mat-cell *matCellDef="let element">{{ element.fullName }}</td>
      </ng-container>

      <ng-container matColumnDef="area">
        <th mat-header-cell *matHeaderCellDef>Area</th>
        <td mat-cell *matCellDef="let element">{{ element.area }}</td>
      </ng-container>

      <ng-container matColumnDef="role">
        <th mat-header-cell *matHeaderCellDef>Role</th>
        <td mat-cell *matCellDef="let element">
          <ng-container *ngIf="editingRow === element.position; else showRole">
            <mat-form-field appearance="outline" style="width: 120px">
              <mat-select
                [value]="editRoleValue"
                (selectionChange)="editRoleValue = $event.value"
              >
                <mat-option *ngFor="let role of roles" [value]="role">{{
                  role
                }}</mat-option>
              </mat-select>
            </mat-form-field>
            <button mat-button color="primary" (click)="saveRole(element)">
              Save
            </button>
            <button mat-button color="warn" (click)="cancelEdit()">
              Cancel
            </button>
          </ng-container>
          <ng-template #showRole>
            {{ element.role }}
          </ng-template>
        </td>
      </ng-container>

      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef>Actions</th>
        <td mat-cell *matCellDef="let element">
          <button
            mat-button
            color="accent"
            (click)="startEdit(element)"
            *ngIf="editingRow !== element.position"
          >
            Edit
          </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
    </table>
  </div>
</section>
