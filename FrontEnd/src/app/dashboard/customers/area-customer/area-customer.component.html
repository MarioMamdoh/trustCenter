<section>
  <div class="filter-section">
    <mat-form-field>
      <mat-label>Select Filter Category</mat-label>
      <mat-select [(ngModel)]="selectedCategory" (selectionChange)="onCategoryChange()">
        <mat-option value="">None</mat-option>
        <mat-option value="area">Area</mat-option>
        <mat-option value="name">Name</mat-option>
      </mat-select>
    </mat-form-field>

    <!-- Area Filter -->
    <mat-form-field *ngIf="selectedCategory === 'area'">
      <mat-label>Select Area</mat-label>
      <mat-select [(ngModel)]="selectedArea" (selectionChange)="filterCustomers($event.value)">
        <mat-option value="">All</mat-option>
        <mat-option *ngFor="let area of areas" [value]="area.area">
          {{ area.area }}
        </mat-option>
      </mat-select>
    </mat-form-field>

    <!-- Name Filter -->
    <mat-form-field *ngIf="selectedCategory === 'name'">
      <mat-label>Search by name</mat-label>
      <input
        matInput
        [(ngModel)]="searchText"
        (ngModelChange)="filterCustomers($event)"
      />
    </mat-form-field>
  </div>

  <div class="table-container">
    <table mat-table [dataSource]="filteredCustomers" class="mat-elevation-z8">
      <ng-container matColumnDef="position">
        <th mat-header-cell *matHeaderCellDef>No.</th>
        <td mat-cell *matCellDef="let element; let i = index">{{ i + 1 }}</td>
      </ng-container>

      <ng-container matColumnDef="fullName">
        <th mat-header-cell *matHeaderCellDef>Full Name</th>
        <td mat-cell *matCellDef="let element">{{ element.fullName }}</td>
      </ng-container>

      <ng-container matColumnDef="age">
        <th mat-header-cell *matHeaderCellDef>Age</th>
        <td mat-cell *matCellDef="let element">{{ element.age }}</td>
      </ng-container>

      <ng-container matColumnDef="area">
        <th mat-header-cell *matHeaderCellDef>Area</th>
        <td mat-cell *matCellDef="let element">{{ element.area }}</td>
      </ng-container>

      <ng-container matColumnDef="phone">
        <th mat-header-cell *matHeaderCellDef>Phone</th>
        <td mat-cell *matCellDef="let element">{{ element.phone }}</td>
      </ng-container>

      <ng-container matColumnDef="additional">
        <th mat-header-cell *matHeaderCellDef>Additional</th>
        <td mat-cell *matCellDef="let element">{{ element.additional }}</td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
    </table>
  </div>
</section>
