<section class="p-4">
  <div class="grid gap-6">

    <div *ngFor="let area of areas" class="area-section">
      <h2 class="text-2xl font-bold mb-4 text-[var(--project-primary-color)]">
        {{ area.area }}
      </h2>
      <div
        class="grid grid-cols-1 gap-4 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5"
      >

        <div
          *ngFor="let bed of bedsByArea[area.area]"
          class="p-4 rounded-lg shadow-md transition-all duration-300 cursor-pointer bed-box"
          [class.bg-green-500]="!bed.isReserved"
          [class.bg-red-500]="bed.isReserved"
          [class.hover:bg-green-600]="!bed.isReserved"
          [class.hover:bg-red-600]="bed.isReserved"
          (click)="onBedClick(bed)"
        >
          <div class="text-white">
            <h3 class="text-lg font-semibold">Bed-{{ bed.numberOfBed }}</h3>
            <p class="mt-1 text-sm">
              {{ bed.isReserved ? "Reserved" : "Available" }}
            </p>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div
    *ngIf="showReservationForm"
    class="flex fixed inset-0 z-50 justify-center items-center bg-black bg-opacity-50"
  >
    <div class="p-6 w-full max-w-md bg-white rounded-lg">
      <h2 class="mb-4 text-2xl font-bold">Remove Bed Reservation</h2>
      <form
        [formGroup]="reservationForm"
        (ngSubmit)="onSubmitReservation()"
        class="space-y-4"
      >
        <div class="form-group">
          <label class="block text-sm font-medium text-gray-700"
            >Bed Number</label
          >
          <input
            type="text"
            formControlName="bedNumber"
            readonly
            class="block px-3 py-2 mt-1 w-full bg-gray-100 rounded-md border border-gray-300 shadow-sm"
          />
        </div>

        <div class="form-group">
          <label class="block text-sm font-medium text-gray-700"
            >Customer Name</label
          >
          <input
            type="text"
            formControlName="customerName"
            [matAutocomplete]="auto"
            class="block px-3 py-2 mt-1 w-full rounded-md border border-gray-300 shadow-sm"
          />
          <mat-autocomplete
            #auto="matAutocomplete"
            (optionSelected)="onCustomerSelect($event.option.value)"
          >
            <mat-option
              *ngFor="let customer of filteredCustomers | async"
              [value]="customer"
            >
              {{ customer.fullName }}
            </mat-option>
          </mat-autocomplete>
        </div>

        <div class="form-group">
          <label class="block text-sm font-medium text-gray-700"
            >Paid Amount</label
          >
          <div class="relative mt-1 rounded-md shadow-sm">
            <div
              class="flex absolute inset-y-0 left-0 items-center pl-3 pointer-events-none"
            >
              <span class="text-gray-500 sm:text-sm">$</span>
            </div>
            <input
              type="number"
              formControlName="paid"
              class="block py-2 pr-12 pl-7 w-full rounded-md border border-gray-300 focus:border-blue-500 focus:ring-blue-500 sm:text-sm"
              placeholder="0.00"
              min="0"
              step="1"
            />
          </div>
          <div
            *ngIf="
              reservationForm.get('paid')?.touched &&
              reservationForm.get('paid')?.errors
            "
            class="mt-1 text-sm text-red-500"
          >
            <span *ngIf="reservationForm.get('paid')?.errors?.['required']">
              Paid amount is required
            </span>
            <span *ngIf="reservationForm.get('paid')?.errors?.['min']">
              Paid amount must be 0 or greater
            </span>
          </div>
        </div>

        <div class="flex justify-end mt-6 space-x-3">
          <button
            type="button"
            class="px-4 py-2 text-sm font-medium text-gray-700 bg-gray-100 rounded-md hover:bg-gray-200"
            (click)="closeForm()"
          >
            Cancel
          </button>
          <button
            type="submit"
            class="px-4 py-2 text-sm font-medium text-white bg-blue-600 rounded-md hover:bg-blue-700"
            [disabled]="!reservationForm.valid"
          >
            Confirm
          </button>
        </div>
      </form>
    </div>
  </div>
</section>
