<app-section-heading
  [section]="'HEADER.BLOGS' | translate"
></app-section-heading>
<div class="container overflow-hidden mx-auto w-full">
  <div
    class="grid grid-cols-3 gap-5 max-lg:grid-cols-2 max-sm:grid-cols-1 max-sm:place-items-center"
  >
    @for(blog of blogs; track blog['_id']){

    <div class="mb-3 bg-white rounded-lg shadow-md blog-item w-85">
      <img
        [src]="blog['image']"
        [alt]="blog['title']"
        class="w-full h-[250px]"
      />
      <div class="flex justify-between p-2 views-date">
        <span class="text-red-700">Views-{{ blog["views"] }}</span>
        <span class="text-yellow-500">{{
          blog["createdAt"] | date : "mediumDate"
        }}</span>
      </div>
      <div class="p-2 content">
        <h3 class="text-xl font-semibold text-center text-[#231942]">
          {{ blog["title"] }}
        </h3>
        <p class="mt-3 font-light text-[#231942]">{{ blog["summary"] }}</p>
        <a
          [routerLink]="['/blog', blog['_id']]"
          class="block mt-2 text-center bg-transparent py-1 text-black rounded-lg border-[#0070cd] border-2 border-solid cursor-pointer hover:bg-[#0070cd] hover:text-white transition-all w-1/2 m-auto"
        >
          Read Article
        </a>
      </div>
    </div>
    }
  </div>

  <!-- Pagination Controls -->
  <div class="flex gap-2 justify-center items-center mt-8 mb-4">
    <button
      (click)="previousPage()"
      [disabled]="currentPage === 1"
      class="px-4 py-2 rounded-lg border-[#0070cd] border-2 border-solid cursor-pointer hover:bg-[#0070cd] hover:text-white transition-all disabled:opacity-50 disabled:cursor-not-allowed"
    >
      {{ "PREVIOUS" | translate }}
    </button>

    <div class="flex gap-2">
      @for(page of [].constructor(totalPages); track page; let i = $index) {
      <button
        (click)="goToPage(i + 1)"
        [class.bg-[#0070cd]]="currentPage === i + 1"
        [class.text-white]="currentPage === i + 1"
        class="px-4 py-2 rounded-lg border-[#0070cd] border-2 border-solid cursor-pointer hover:bg-[#0070cd] hover:text-white transition-all"
      >
        {{ i + 1 }}
      </button>
      }
    </div>

    <button
      (click)="nextPage()"
      [disabled]="currentPage === totalPages"
      class="px-4 py-2 rounded-lg border-[#0070cd] border-2 border-solid cursor-pointer hover:bg-[#0070cd] hover:text-white transition-all disabled:opacity-50 disabled:cursor-not-allowed"
    >
      {{ "NEXT" | translate }}
    </button>
  </div>
</div>
